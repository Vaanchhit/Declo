    function injectStyles(css) {
      const style = document.createElement("style");
      style.textContent = css;
      document.head.appendChild(style);
    }
    injectStyles(STYLES);

    function getUserId() {
      return localStorage.getItem("tracker_user_id") || "";
    }

    function getProfileName() {
      return localStorage.getItem("tracker_profile_name") || "";
    }

    function getProfileEmail() {
      return localStorage.getItem("tracker_profile_email") || "";
    }

    function cacheSessionUser(user) {
      const metadata = user?.user_metadata || {};
      const fallbackEmail = user?.email || "";
      const fallbackName = metadata.name || metadata.full_name || (fallbackEmail ? fallbackEmail.split("@")[0] : "Declo");
      localStorage.setItem("tracker_user_id", user?.id || "");
      localStorage.setItem("tracker_profile_name", fallbackName);
      localStorage.setItem("tracker_profile_email", fallbackEmail);
    }

    function clearCachedUser() {
      localStorage.removeItem("tracker_user_id");
      localStorage.removeItem("tracker_profile_name");
      localStorage.removeItem("tracker_profile_email");
    }

    function slugifyName(value) {
      return value
        .toLowerCase()
        .trim()
        .replace(/[^a-z0-9]+/g, "_")
        .replace(/^_+|_+$/g, "")
        .slice(0, 32);
    }

    async function buildHeaders(headers = {}) {
      if (!supabaseClient) throw new Error("Supabase client is not ready.");
      const { data } = await supabaseClient.auth.getSession();
      const token = data?.session?.access_token || "";
      return {
        "Content-Type": "application/json",
        ...(token ? { "Authorization": `Bearer ${token}` } : {}),
        ...headers,
      };
    }

    async function apiFetch(url, options = {}) {
      const headers = await buildHeaders(options.headers);
      const res = await fetch(url, { ...options, headers });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        const message = data?.error?.message || data?.error || `API Error: ${res.statusText}`;
        throw new Error(message);
      }
      return data;
    }

    async function loadRuntimeConfig() {
      const res = await fetch("/api/config", { cache: "no-store" });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        throw new Error(data?.error?.message || data?.error || "Unable to load runtime configuration.");
      }
      if (!data.supabaseUrl || !data.supabaseAnonKey) {
        throw new Error("Supabase environment variables are not configured on the server.");
      }
      runtimeConfig.supabaseUrl = data.supabaseUrl;
      runtimeConfig.supabaseAnonKey = data.supabaseAnonKey;
      runtimeConfig.configured = true;
      const supabaseSdk = window.supabase || globalThis.supabase;
      if (!supabaseSdk || typeof supabaseSdk.createClient !== "function") {
        throw new Error("Supabase browser SDK failed to load from the CDN.");
      }
      supabaseClient = supabaseSdk.createClient(runtimeConfig.supabaseUrl, runtimeConfig.supabaseAnonKey);
    }

    function todayKey() {
      return new Date().toISOString().slice(0, 10);
    }

    function uid() {
      return `trk_${Math.random().toString(36).slice(2, 10)}`;
    }

    function formatDuration(seconds) {
      const h = Math.floor(seconds / 3600);
      const m = Math.floor((seconds % 3600) / 60);
      const s = seconds % 60;
      if (h > 0) return `${h}:${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
      return `${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
    }

    function formatShortDuration(seconds) {
      const mins = Math.floor(seconds / 60);
      if (mins < 60) return `${mins}m`;
      const hrs = Math.floor(mins / 60);
      const rem = mins % 60;
      return rem ? `${hrs}h ${rem}m` : `${hrs}h`;
    }

    function inferCategory(raw) {
      const explicit = (raw.category || "").toLowerCase();
      if (["study", "diet", "exercise", "habits", "none"].includes(explicit)) return explicit;

      const haystack = [
        raw.name,
        raw.unit,
        raw.primary_action,
        ...(raw.optional_actions || []),
        ...((raw.fields || []).map((field) => field?.name)),
      ].filter(Boolean).join(" ").toLowerCase();

      if (/(read|study|learn|book|course|pages)/.test(haystack)) return "study";
      if (/(water|meal|calorie|protein|carb|diet|food|macro)/.test(haystack)) return "diet";
      if (/(gym|workout|run|walk|exercise|lift|yoga|cycling)/.test(haystack)) return "exercise";
      if (/(habit|meditat|journal|stretch|sleep|clean|pray)/.test(haystack)) return "habits";
      return "none";
    }

    function normalizeFields(rawFields, type, unit) {
      const cleaned = Array.isArray(rawFields)
        ? rawFields
          .filter((field) => field && typeof field === "object")
          .map((field) => ({
            name: String(field.name || "").trim(),
            type: String(field.type || "").trim().toLowerCase(),
            unit: field.unit ? String(field.unit).trim() : null,
          }))
          .filter((field) => field.name && ["number", "boolean", "time"].includes(field.type))
          .slice(0, 4)
        : [];

      if (cleaned.length) return cleaned;
      if (type === "binary") return [{ name: "done", type: "boolean", unit: null }];
      if (type === "session") return [{ name: "duration", type: "time", unit: "minutes" }];
      return [{ name: "amount", type: "number", unit: unit || null }];
    }

    function normalizeTracker(raw) {
      const type = (raw.type || raw.mode || "binary").toLowerCase();
      const resolvedType = ["binary", "numeric", "session"].includes(type) ? type : "binary";
      const rawFrequency = String(raw.frequency || "daily").toLowerCase();
      const frequency = ["daily", "weekly", "monthly", "yearly", "custom"].includes(rawFrequency) ? rawFrequency : "daily";
      const increments = Array.isArray(raw.increments) && raw.increments.length
        ? raw.increments.filter((value) => Number(value) > 0).slice(0, 3).map(Number)
        : (resolvedType === "numeric" ? [1] : []);
      const unit = raw.unit || "";
      const fields = normalizeFields(raw.fields, resolvedType, unit);
      const primaryAction = raw.primary_action || (
        resolvedType === "binary"
          ? "check off"
          : resolvedType === "session"
            ? "start timer"
            : `+${(increments[0] || (unit === "ml" ? 250 : 1))}${unit || ""}`
      );
      const optionalActions = Array.isArray(raw.optional_actions) && raw.optional_actions.length
        ? raw.optional_actions.slice(0, 3).map(String)
        : (
          resolvedType === "numeric"
            ? [unit ? `manual ${unit}` : "manual entry"]
            : resolvedType === "session"
              ? ["manual duration"]
              : ["add note"]
        );
      return {
        id: raw.id || uid(),
        name: raw.name || "tracker",
        type: resolvedType,
        mode: resolvedType,
        category: inferCategory(raw),
        fields,
        logging_mode: raw.logging_mode || (resolvedType === "binary" ? "simple" : resolvedType === "numeric" ? "quantity" : "time"),
        unit,
        goal: typeof raw.goal === "number" ? raw.goal : null,
        frequency,
        frequency_label: frequency === "custom" ? String(raw.frequency_label || "").trim() : "",
        increments,
        primary_action: primaryAction,
        optional_actions: optionalActions,
      };
    }

    async function parseTrackers(input, trackers, signal) {
      const data = await apiFetch("/api/parse", {
        method: "POST",
        signal,
        body: JSON.stringify({ input, trackers }),
      });
      return (data.trackers || []).map(normalizeTracker);
    }

    async function loadState() {
      try {
        const state = await apiFetch("/api/state");
        return {
          trackers: (state.trackers || []).map(normalizeTracker),
          data: state.data || {},
          meta: state.meta || {},
        };
      } catch {
        return { trackers: [], data: {}, meta: {} };
      }
    }

    async function saveState(state) {
      await apiFetch("/api/state", {
        method: "POST",
        body: JSON.stringify(state),
      });
    }

    function ensureDayData(data, trackerId, dateKey) {
      return data?.[trackerId]?.[dateKey] || {};
    }

    function computeBinaryStreak(trackerHistory, dateKey) {
      let streak = 0;
      const cursor = new Date(`${dateKey}T00:00:00`);
      while (true) {
        const key = cursor.toISOString().slice(0, 10);
        if (!trackerHistory?.[key]?.done) break;
        streak += 1;
        cursor.setDate(cursor.getDate() - 1);
      }
      return streak;
    }

    function activityValue(entry, tracker) {
      if (!entry) return 0;
      if (tracker.type === "binary") return entry.done ? 1 : 0;
      if (tracker.type === "numeric") return entry.count || 0;
      if (tracker.type === "session") {
        const runningExtra = entry.running && entry.startedAt ? Math.floor((Date.now() - entry.startedAt) / 1000) : 0;
        return Math.round(((entry.totalSeconds || 0) + (entry.currentSessionSeconds || 0) + runningExtra) / 60);
      }
      return 0;
    }

    function aggregateActivity(trackers, data) {
      const totals = {};
      trackers.forEach((tracker) => {
        const trackerData = data[tracker.id] || {};
        Object.entries(trackerData).forEach(([dateKey, entry]) => {
          totals[dateKey] = (totals[dateKey] || 0) + activityValue(entry, tracker);
        });
      });
      return totals;
    }

    function getLastNDates(days) {
      return Array.from({ length: days }, (_, index) => {
        const d = new Date();
        d.setDate(d.getDate() - (days - index - 1));
        return d;
      });
    }

    function getInitials(name) {
      return (name || "U")
        .split(/\s+/)
        .filter(Boolean)
        .slice(0, 2)
        .map((part) => part[0]?.toUpperCase() || "")

    function resolveTheme(theme) {
      if (theme === "system") {

                  />
                </div>
              </section>
            </div>
          </div>
        </div>

    function SidebarSection({ title, summary, defaultOpen = true, children }) {
      const [open, setOpen] = useState(defaultOpen);

      return (
        <section className="side-card">
          <button type="button" className="side-toggle" onClick={() => setOpen((value) => !value)}>
            <div className="side-toggle-copy">
              <div className="side-title">{title}</div>
              <div className="side-summary">{summary}</div>
            </div>
            <span className="chevron">{open ? "▾" : "▸"}</span>
          </button>
          {open ? <div className="side-card-body">{children}</div> : null}
        </section>
      );
    }

    function Sidebar({ trackers, data, onJumpToTracker, onOpenDay }) {
      const today = todayKey();
      const completed = trackers.reduce((acc, tracker) => {
        const entry = ensureDayData(data, tracker.id, today);
        if (tracker.type === "binary") return acc + (entry.done ? 1 : 0);
        if (tracker.type === "numeric") {
          if (tracker.goal) return acc + ((entry.count || 0) >= tracker.goal ? 1 : 0);
          return acc + ((entry.count || 0) > 0 ? 1 : 0);
        }
        if (tracker.type === "session") return acc + (((entry.totalSeconds || 0) > 0 || entry.running || (entry.currentSessionSeconds || 0) > 0) ? 1 : 0);
        return acc;
      }, 0);

      const activity = aggregateActivity(trackers, data);
      const dates = getLastNDates(84);
      const maxActivity = Math.max(...Object.values(activity), 0);
      const weekDates = getLastNDates(7);

      return (
        <aside className="sidebar">
          <SidebarSection title="Today" summary="Daily snapshot" defaultOpen={true}>
            <div className="snapshot">{completed} / {trackers.length || 0}</div>
            <div className="snapshot-copy">trackers completed</div>
          </SidebarSection>

          <SidebarSection title="Today's Targets" summary="What's left" defaultOpen={true}>
            <div className="tracker-list">
              {trackers.map((tracker) => {
                const entry = ensureDayData(data, tracker.id, today);
                let status = "";
                if (tracker.type === "binary") status = entry.done ? "Done" : "Pending";
                if (tracker.type === "numeric") {
                  const count = entry.count || 0;
                  status = tracker.goal ? `${count} / ${tracker.goal} ${tracker.unit || ""}` : `${count} logged`;
                }
                if (tracker.type === "session") {
                  const total = entry.totalSeconds || 0;
                  status = formatShortDuration(total);
                }
                return (
                  <div key={tracker.id} style={{ display: "flex", justifyContent: "space-between", fontSize: "0.85rem", padding: "4px 0" }}>
                    <span>{tracker.name}</span>
                    <span style={{ color: "var(--muted)" }}>{status}</span>
                  </div>
                );
              })}
            </div>
          </SidebarSection>

          <SidebarSection title="Daily progress" summary="Last 12 weeks" defaultOpen={true}>
            <div className="heatmap">
              {dates.map((date) => {
                const key = date.toISOString().slice(0, 10);
                const value = activity[key] || 0;
                let level = "";
                if (value > 0 && maxActivity > 0) {
                  const ratio = value / maxActivity;
                  level = ratio < 0.34 ? "l1" : ratio < 0.67 ? "l2" : "l3";
                }
                return (
                  <button
                    key={key}
                    className={`heat-cell ${level}`}
                    title={key}
                    onClick={() => onOpenDay(key)}
                  />
                );
              })}
            </div>
          </SidebarSection>

          <SidebarSection title="Weekly momentum" summary="Last 7 days" defaultOpen={true}>
            <div className="bars">
              {weekDates.map((date) => {
                const key = date.toISOString().slice(0, 10);
                const value = activity[key] || 0;
                const height = maxActivity > 0 ? Math.max((value / maxActivity) * 80, value > 0 ? 10 : 6) : 6;
                return (
                  <div className="bar-wrap" key={key}>
                    <div className="bar" style={{ height: `${height}px` }} />
                    <div className="bar-label">{date.toLocaleDateString("en-US", { weekday: "narrow" })}</div>
                  </div>
                );
              })}
            </div>
          </SidebarSection>

          <SidebarSection title="Trackers" summary={`${trackers.length || 0} in your workspace`} defaultOpen={true}>
            <div className="tracker-list">
              {trackers.map((tracker) => (
                <button
                  key={tracker.id}
                  className="tracker-link"
                  onClick={() => onJumpToTracker(tracker.id)}
                >
                  {tracker.name}
                </button>
              ))}
            </div>
          </SidebarSection>
        </aside>
      );
    }

    function BinaryCard({ tracker, entry, trackerHistory, onToggle }) {
      const streak = computeBinaryStreak(trackerHistory, todayKey());
      return (
        <div className="primary-zone">
          <div className="binary-row">
            <button className={`binary-btn${entry.done ? " done" : ""}`} onClick={onToggle}>
              {entry.done ? "✓" : ""}
            </button>
            <div className="metric">
              <strong>{entry.done ? "Done today" : "Not yet"}</strong><br />
              {getFrequencyLabel(tracker)}{streak > 0 ? ` • ${streak} day streak` : ""}
            </div>
          </div>
        </div>
      );
    }

    function NumericCard({ tracker, entry, onAdd, onSubtract, onCustomize }) {
      const count = entry.count || 0;
      const goal = tracker.goal;
      const ratio = goal ? Math.min(count / goal, 1) : 0;
      return (
        <div className="primary-zone">
          <div className="numeric-line">
            <div className="count">{count}</div>
            {tracker.unit ? <div className="unit">{tracker.unit}</div> : null}
          </div>
          
          <div className="metric" style={{ display: "flex", alignItems: "center", gap: "8px", margin: "4px 0" }}>
            <span style={{ color: "var(--muted)" }}>Target:</span>
            <input
              className="micro-input"
              style={{ minHeight: "32px", padding: "4px 10px", width: "90px", border: "1px solid var(--line)", background: "var(--surface-solid)" }}
              type="number"
              min="0"
              placeholder="None"
              value={goal || ""}
              onChange={(e) => onCustomize({ goal: e.target.value === "" ? null : Number(e.target.value) })}
            />
            {tracker.unit ? <span style={{ color: "var(--muted)" }}>{tracker.unit}</span> : null}
          </div>

          {goal ? (
            <>
              <div className="metric"><strong>{Math.max(goal - count, 0)}</strong> {tracker.unit || ""} to go</div>
              <div className="progress-track">
                <div className="progress-fill" style={{ width: `${ratio * 100}%` }} />
              </div>
            </>
          ) : (
            <div className="metric"><strong>{count}</strong> logged today</div>
          )}
          <div className="inc-row">
            {(tracker.increments?.length ? tracker.increments : [1]).map((step) => (
              <button key={step} className="inc-btn" onClick={() => onAdd(step)}>
                +{step}{tracker.unit ? ` ${tracker.unit}` : ""}
              </button>
            ))}
            {count > 0 ? <button className="tiny-btn" onClick={() => onSubtract(1)}>−1</button> : null}
          </div>
        </div>
      );
    }

    function SessionCard({ tracker, entry, onToggle, onLog, onCustomize }) {
      const [now, setNow] = useState(Date.now());
      useEffect(() => {
        if (!entry.running) return undefined;
        const id = setInterval(() => setNow(Date.now()), 1000);
        return () => clearInterval(id);
      }, [entry.running]);

      const elapsed = entry.running && entry.startedAt ? Math.floor((now - entry.startedAt) / 1000) : 0;
      const currentSessionTotal = (entry.currentSessionSeconds || 0) + elapsed;
      const totalToday = (entry.totalSeconds || 0) + currentSessionTotal;
      const sessionCount = (entry.logs || []).filter((log) => log.kind === "session").length;
      const goalMinutes = tracker.goal;
      const ratio = goalMinutes ? Math.min(totalToday / (goalMinutes * 60), 1) : 0;

      return (
        <div className="primary-zone">
          <div className="session-line">
            <div className="time">{formatDuration(currentSessionTotal)}</div>
            {!entry.running && currentSessionTotal > 0 ? (
              <>
                <button className="session-btn" onClick={onToggle}>Resume</button>
                <button className="session-btn running" onClick={onLog}>Log</button>
              </>
            ) : (
              <button className={`session-btn${entry.running ? " running" : ""}`} onClick={onToggle}>
                {entry.running ? "Pause" : "Start"}
              </button>
            )}
            {entry.running ? <div className="session-pulse" /> : null}
          </div>

          <div className="metric" style={{ display: "flex", alignItems: "center", gap: "8px", margin: "4px 0" }}>
            <span style={{ color: "var(--muted)" }}>Target (min):</span>
            <input
              className="micro-input"
              style={{ minHeight: "32px", padding: "4px 10px", width: "90px", border: "1px solid var(--line)", background: "var(--surface-solid)" }}
              type="number"
              min="0"
              placeholder="None"
              value={goalMinutes || ""}
              onChange={(e) => onCustomize({ goal: e.target.value === "" ? null : Number(e.target.value) })}
            />
          </div>

          {goalMinutes ? (
            <>
              <div className="metric"><strong>{formatShortDuration(totalToday)}</strong> total today • <strong>{Math.max(goalMinutes - Math.floor(totalToday / 60), 0)}</strong> mins to go</div>
              <div className="progress-track">
                <div className="progress-fill" style={{ width: `${ratio * 100}%` }} />
              </div>
            </>
          ) : (
            <div className="metric">
              {entry.running || currentSessionTotal > 0 ? `Current session • ` : ""}
              <strong>{formatShortDuration(totalToday)}</strong> total today
              {sessionCount ? ` • ${sessionCount} session${sessionCount === 1 ? "" : "s"} logged` : ""}
            </div>
          )}
        </div>
      );
    }

    function TrackerCard({
      tracker,
      entry,
      trackerHistory,
      onDelete,
      onRename,
      onToggleBinary,
      onAddNumeric,
      onSubtractNumeric,
      onToggleSession,
      onLogSession,
      onAddSessionMinutes,

    }) {
      const [editingName, setEditingName] = useState(false);

      useEffect(() => setDraftName(tracker.name), [tracker.name]);

      const recentLogs = (entry.logs || []).slice(-5).reverse();

      const submitManual = () => {
        const value = Number(manualValue);
        if (!Number.isFinite(value) || value <= 0) return;
        if (tracker.type === "numeric") onAddNumeric(value);
        if (tracker.type === "session") onAddSessionMinutes(value);
        setManualValue("");
      };

      return (
        <article className={`card${draggableProps.dragging ? " dragging" : ""}`} ref={innerRef} draggable onDragStart={draggableProps.onDragStart} onDragOver={draggableProps.onDragOver} onDrop={draggableProps.onDrop}>
          <div className="card-head">
            <div className="card-title-wrap">
              {editingName ? (
                <input
                  className="inline-input"
                  value={draftName}
                  autoFocus

                  onBlur={() => {

                    if (e.key === "Enter") {

                    }

                <button className="card-title" onClick={() => setEditingName(true)}>{tracker.name}</button>
              )}
              <div className="meta-pill">{tracker.category}</div>

            </div>
            <div className="card-actions">

            </div>
          </div>

          {tracker.type === "binary" ? (
            <BinaryCard tracker={tracker} entry={entry} trackerHistory={trackerHistory} onToggle={onToggleBinary} />
          ) : null}
          {tracker.type === "numeric" ? (
          <NumericCard tracker={tracker} entry={entry} onAdd={onAddNumeric} onSubtract={onSubtractNumeric} onCustomize={(patch) => onCustomize(patch)} />
          ) : null}
          {tracker.type === "session" ? (
        <SessionCard tracker={tracker} entry={entry} onToggle={onToggleSession} onLog={onLogSession} onCustomize={(patch) => onCustomize(patch)} />
          ) : null}

          <div className="secondary-row">
            <button className="link-btn" onClick={onToggleCustomize}>
              {expanded ? "▾ detail" : "▸ detail"}

            <div className="metric">
              {tracker.goal ? `goal ${tracker.goal}${tracker.unit ? ` ${tracker.unit}` : ""}` : tracker.logging_mode}
            </div>
          </div>

          {expanded ? (
            <div className="detail-row">
              <div className="detail-grid">
                <label className="detail-label">
                  Category
                  <select
                    className="inline-select"
                    value={tracker.category}
                    onChange={(e) => onCustomize({ category: e.target.value })}
                  >
                    <option value="study">study</option>
                    <option value="diet">diet</option>
                    <option value="exercise">exercise</option>
                    <option value="habits">habits</option>
                    <option value="none">none</option>
                  </select>
                </label>
                <label className="detail-label">
                  Unit
                  <input
                    className="inline-input"
                    value={tracker.unit || ""}
                    onChange={(e) => onCustomize({ unit: e.target.value })}
                    placeholder="none"
                  />
                </label>
                <label className="detail-label">
                  Logging
                  <select
                    className="inline-select"
                    value={tracker.logging_mode}
                    onChange={(e) => onCustomize({ logging_mode: e.target.value })}
                  >
                    <option value="simple">simple</option>
                    <option value="quantity">quantity</option>
                    <option value="time">time</option>
                  </select>
                </label>
                <label className="detail-label">
                  Frequency
                  <select
                    className="inline-select"
                    value={tracker.frequency}
                    onChange={(e) => onCustomize({ frequency: e.target.value })}
                  >
                    <option value="daily">daily</option>
                    <option value="weekly">weekly</option>
                    <option value="monthly">monthly</option>
                    <option value="yearly">yearly</option>
                    <option value="custom">custom</option>
                  </select>
                </label>
                {tracker.frequency === "custom" ? (
                  <label className="detail-label">
                    Custom cadence
                    <input
                      className="inline-input"
                      value={tracker.frequency_label || ""}
                      onChange={(e) => onCustomize({ frequency_label: e.target.value })}
                      placeholder="weekdays, alternate weeks, etc."
                    />
                  </label>
                ) : null}
                {tracker.type !== "binary" ? (
                  <label className="detail-label">
                    Goal
                    <input
                      className="inline-input"
                      value={tracker.goal ?? ""}
                      onChange={(e) => onCustomize({ goal: e.target.value === "" ? null : Number(e.target.value) })}
                      type="number"
                      min="0"
                      placeholder="optional"
                    />
                  </label>
                ) : null}
              </div>
              {tracker.type !== "binary" ? (
                <div className="optional-input-row">
                  <input
                    className="micro-input"
                    type="number"
                    min="0"
                    placeholder={tracker.type === "session" ? "minutes" : tracker.unit || "amount"}
                    value={manualValue}
                    onChange={(e) => setManualValue(e.target.value)}
                    onKeyDown={(e) => {
                      if (e.key === "Enter") {
                        e.preventDefault();
                        submitManual();
                      }
                    }}
                  />
                  <button type="button" className="tiny-btn" onClick={submitManual}>
                    {tracker.optional_actions[0] || "log"}
                  </button>
                </div>
              ) : null}
              <div className="history-list">
                {recentLogs.length ? recentLogs.map((log, index) => {
                  let text = "updated";
                  if (log.kind === "binary") text = "checked off";
                  if (log.kind === "numeric") text = `+${log.value}${tracker.unit ? ` ${tracker.unit}` : ""}`;
                  if (log.kind === "session") text = formatShortDuration(log.seconds || 0);
                  const timeLabel = log.at
                    ? new Date(log.at).toLocaleTimeString([], { hour: "numeric", minute: "2-digit" })
                    : "today";
                  return (
                    <div className="history-item" key={log.at || index}>
                      <span>{text}</span>
                      <div style={{display: 'flex', alignItems: 'center', gap: '8px'}}>
                        <span className="history-meta">{timeLabel}</span>
                        <button type="button" className="link-btn" style={{padding: '2px', lineHeight: 1, fontSize: '1.2rem'}} onClick={() => onRemoveLog(log.at)} title="Delete log entry">&times;</button>
                      </div>
                    </div>
                  );
                }) : (
                  <div className="history-item">
                    <span>No logs yet</span>
                    <span className="history-meta">list view</span>
                  </div>

            </div>

        </article>

        <div className="auth-shell">

    function App({ bootError = "" }) {
      const [input, setInput] = useState("");
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState("");
      const [state, setState] = useState({ trackers: [], data: {}, meta: {} });
      const [ready, setReady] = useState(false);
      const [authReady, setAuthReady] = useState(false);
      const [currentUserId, setCurrentUserId] = useState(getUserId());
      const [profileName, setProfileName] = useState(getProfileName());
      const [profileEmail, setProfileEmail] = useState(getProfileEmail());
      const [authMode, setAuthMode] = useState("signup");
      const [authLoading, setAuthLoading] = useState(false);
      const [authError, setAuthError] = useState("");
      const [authForm, setAuthForm] = useState({
        name: getProfileName(),
        email: getProfileEmail(),
        password: "",
      });
      const [manualOpen, setManualOpen] = useState(false);
      const [manual, setManual] = useState({ name: "", type: "binary" });
      const [expanded, setExpanded] = useState({});
      const [undoState, setUndoState] = useState(null);
      const [redoState, setRedoState] = useState(null);
      const [profileOpen, setProfileOpen] = useState(false);
      const [exportMenuOpen, setExportMenuOpen] = useState(false);
      const [deleteMenuOpen, setDeleteMenuOpen] = useState(false);
      const [preferencesOpen, setPreferencesOpen] = useState(false);
      const [dayModal, setDayModal] = useState(null);
      const [draggingId, setDraggingId] = useState(null);
      const [drawerOpen, setDrawerOpen] = useState(false);
      const [composerOpen, setComposerOpen] = useState(false);
      const [frequencyPreset, setFrequencyPreset] = useState("daily");
      const [customFrequency, setCustomFrequency] = useState("");
      const [musicPlaying, setMusicPlaying] = useState(false);
      const inputRef = useRef(null);
      const cardRefs = useRef({});
      const parseControllerRef = useRef(null);
      const audioRef = useRef(null);

      const closeFloatingUi = (except = []) => {
        if (!except.includes("profile")) setProfileOpen(false);
        if (!except.includes("export")) setExportMenuOpen(false);
        if (!except.includes("delete")) setDeleteMenuOpen(false);
        if (!except.includes("preferences")) setPreferencesOpen(false);
        if (!except.includes("day")) setDayModal(null);
        if (!except.includes("drawer")) setDrawerOpen(false);
        if (!except.includes("composer")) setComposerOpen(false);
        if (!except.includes("manual")) setManualOpen(false);
      };

      useEffect(() => {
        if (bootError) {
          setAuthReady(true);
          return undefined;
        }

        let active = true;

        const applySession = (session) => {
          if (!active) return;
          const user = session?.user || null;
          if (user) {
            cacheSessionUser(user);
            setCurrentUserId(user.id);
            setProfileName(getProfileName());
            setProfileEmail(getProfileEmail());
          } else {
            clearCachedUser();
            setCurrentUserId("");
            setProfileName("");
            setProfileEmail("");
            setState({ trackers: [], data: {}, meta: {} });
            setReady(false);
          }
          setAuthReady(true);
        };

        supabaseClient.auth.getSession()
          .then(({ data }) => applySession(data?.session || null))
          .catch(() => {
            if (!active) return;
            setAuthReady(true);
            setAuthError("Unable to restore your session.");
          });

        const { data: { subscription } } = supabaseClient.auth.onAuthStateChange((_event, session) => {
          applySession(session);
        });

        return () => {
          active = false;
          subscription.unsubscribe();
        };
      }, [bootError]);

      useEffect(() => {
        if (!authReady || !currentUserId) {
          setReady(false);
          return undefined;
        }
        loadState().then((next) => {
          const preferences = {
            ...getDefaultPreferences(),
            ...(next.meta?.preferences || {}),
          };
          setState({
            ...next,
            meta: {
              ...next.meta,
              preferences,
            },
          });
          setReady(true);
        });
        return undefined;
      }, [authReady, currentUserId]);

      useEffect(() => {
        const preferences = state.meta?.preferences || getDefaultPreferences();
        document.documentElement.dataset.theme = resolveTheme(preferences.theme);
        document.documentElement.dataset.motion = preferences.animations === "minimal" ? "minimal" : "on";
      }, [state.meta]);

      useEffect(() => {
        const handler = (e) => {
          const tag = document.activeElement?.tagName;
          if (e.key === "+" && tag !== "INPUT" && tag !== "TEXTAREA" && tag !== "SELECT") {
            e.preventDefault();
            closeFloatingUi(["composer"]);
            setComposerOpen(true);
            inputRef.current?.focus();
          }
          if (e.key === "Escape") closeFloatingUi();
        };
        window.addEventListener("keydown", handler);
        return () => window.removeEventListener("keydown", handler);
      }, []);

      useEffect(() => {
        const handler = (event) => {
          if (!event.target.closest(".profile-wrap")) {
            setProfileOpen(false);
            setExportMenuOpen(false);
            setDeleteMenuOpen(false);
          }
        };
        document.addEventListener("mousedown", handler);
        return () => document.removeEventListener("mousedown", handler);
      }, []);

      useEffect(() => {
        if (audioRef.current) {
          if (musicPlaying) audioRef.current.play().catch(() => setMusicPlaying(false));
          else audioRef.current.pause();
        }
      }, [musicPlaying]);

      useEffect(() => {
        if (!profileOpen) {
          setDeleteMenuOpen(false);
          setExportMenuOpen(false);
        }
      }, [profileOpen]);

      const persist = async (next, undoLabel = "") => {
        setUndoState({ previous: state, label: undoLabel });
        setRedoState(null);
        setState(next);
        await saveState(next);
      };

      const updatePreferences = async (patch) => {
        const current = state.meta?.preferences || getDefaultPreferences();
        const next = {
          ...state,
          meta: {
            ...state.meta,
            preferences: {
              ...current,
              ...patch,
            },
          },
        };
        setState(next);
        await saveState(next);
      };

      const handleAuth = async () => {
        setAuthLoading(true);
        setAuthError("");
        try {
          let data, error;
          if (authMode === "signup") {
            const res = await supabaseClient.auth.signUp({
              email: authForm.email,
              password: authForm.password,
              options: {
                data: {
                  name: authForm.name,
                  full_name: authForm.name,
                }
              }
            });
            data = res.data;
            error = res.error;
          } else {
            const res = await supabaseClient.auth.signInWithPassword({
              email: authForm.email,
              password: authForm.password,
            });
            data = res.data;
            error = res.error;
          }

          if (error) throw error;

          const user = data?.user || {};
          const session = data?.session;

          if (authMode === "signup" && !session) {
            setAuthError("Account created. Check your email to continue.");
            setAuthMode("login");
            setAuthForm((current) => ({ ...current, password: "" }));
            return;
          }

          if (!user.id) {
            throw new Error("Authentication completed, but no user id was returned.");
          }

          const metadata = user.user_metadata || {};
          const name = metadata.name || metadata.full_name || authForm.name || authForm.email.split("@")[0];

          cacheSessionUser({ ...user, user_metadata: { ...metadata, name } });
          setCurrentUserId(user.id);
          setProfileName(name);
          setProfileEmail(user.email);
          setAuthForm((current) => ({ ...current, password: "" }));
          setError("");
        } catch (e) {
          setAuthError(e.message || "Authentication failed.");
        } finally {
          setAuthLoading(false);
        }
      };

      const handleResetPassword = async () => {
        if (!authForm.email.trim()) {
          setAuthError("Enter your email to reset password.");
          return;
        }
        setAuthLoading(true);
        const { error } = await supabaseClient.auth.resetPasswordForEmail(authForm.email);
        setAuthLoading(false);
        if (error) setAuthError(error.message);
        else setAuthError("Password reset email sent.");
      };

      const today = todayKey();

      const handleSubmit = async () => {
        if (!input.trim() || loading || (frequencyPreset === "custom" && !customFrequency.trim())) return;
        const controller = new AbortController();
        parseControllerRef.current = controller;
        setLoading(true);
        setError("");
        try {
          const selectedFrequencyLabel = frequencyPreset === "custom" ? customFrequency.trim() : frequencyPreset;
          const promptInput = `${input.trim()}\nCadence: ${selectedFrequencyLabel}.`;
          const trackers = (await parseTrackers(promptInput, state.trackers, controller.signal)).map((tracker) => normalizeTracker({
            ...tracker,
            frequency: frequencyPreset,
            frequency_label: frequencyPreset === "custom" ? customFrequency.trim() : "",
          }));
          const currentData = state.data || {};
          const trackerIds = new Set(trackers.map((tracker) => tracker.id));
          const prunedData = Object.fromEntries(Object.entries(currentData).filter(([trackerId]) => trackerIds.has(trackerId)));
          const next = { ...state, trackers, data: prunedData };
          await persist(next, "Prompt applied");
          setInput("");
          closeFloatingUi();
        } catch (e) {
          if (e.name === "AbortError") {
            setError("Thinking stopped.");
          } else {
            setError(e.message || "Something went wrong. Try again.");
          }
        } finally {
          parseControllerRef.current = null;
          setLoading(false);
        }
      };

      const addManualTracker = async () => {
        const name = manual.name.trim();
        if (!name) return;
        const tracker = normalizeTracker({
          id: uid(),
          name,
          type: manual.type,
          logging_mode: manual.type === "binary" ? "simple" : manual.type === "numeric" ? "quantity" : "time",
          unit: manual.type === "numeric" ? "" : null,
          goal: null,
          frequency: frequencyPreset,
          frequency_label: frequencyPreset === "custom" ? customFrequency.trim() : "",
          increments: manual.type === "numeric" ? [1] : null,
        });
        const next = { ...state, trackers: [...state.trackers, tracker] };
        await persist(next, "Manual tracker added");
        setManual({ name: "", type: "binary" });
      };

      const mutateTrackerData = async (trackerId, updater, undoLabel) => {
        const prevEntry = ensureDayData(state.data, trackerId, today);
        const trackerData = state.data[trackerId] || {};
        const nextEntry = updater(prevEntry, trackerData);
        const next = {
          ...state,
          data: {
            ...state.data,
            [trackerId]: {
              ...trackerData,
              [today]: nextEntry,
            },
          },
        };
        await persist(next, undoLabel);
      };

      const toggleBinary = (tracker) => mutateTrackerData(
        tracker.id,
        (prev, trackerHistory) => {
          const done = !prev.done;
          const next = { ...prev, done };
          if (done) {
            const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
            const streak = (trackerHistory[yesterday]?.done ? (trackerHistory[yesterday]?.streak || 0) : 0) + 1;
            next.streak = streak;
            next.logs = [...(prev.logs || []).filter((log) => log.kind !== "binary"), { kind: "binary", label: "done" }];
          } else {
            next.streak = 0;
            next.logs = [];
          }
          return next;
        },
        `${tracker.name} toggled`
      );

      const addNumeric = (tracker, amount) => mutateTrackerData(
        tracker.id,
        (prev) => ({
          ...prev,
          count: (prev.count || 0) + amount,
          logs: [...(prev.logs || []), { kind: "numeric", value: amount, at: Date.now() }],
        }),
        `${tracker.name} logged`
      );

      const subtractNumeric = (tracker, amount) => mutateTrackerData(
        tracker.id,
        (prev) => ({
          ...prev,
          count: Math.max(0, (prev.count || 0) - amount),
          logs: (prev.logs || []).slice(0, -1),
        }),
        `${tracker.name} adjusted`
      );

      const toggleSession = (tracker) => mutateTrackerData(
        tracker.id,
        (prev) => {
          if (prev.running && prev.startedAt) {
            const elapsed = Math.floor((Date.now() - prev.startedAt) / 1000);
            return {
              ...prev,
              running: false,
              startedAt: null,
              currentSessionSeconds: (prev.currentSessionSeconds || 0) + elapsed,
            };
          }
          return { ...prev, running: true, startedAt: Date.now() };
        },
        `${tracker.name} session updated`
      );

      const logSession = (tracker) => mutateTrackerData(
        tracker.id,
        (prev) => {
          const secondsToLog = prev.currentSessionSeconds || 0;
          if (secondsToLog <= 0) return prev;
          return {
            ...prev,
            currentSessionSeconds: 0,
            totalSeconds: (prev.totalSeconds || 0) + secondsToLog,
            logs: [...(prev.logs || []), { kind: "session", seconds: secondsToLog, at: Date.now() }],
          };
        },
        `${tracker.name} session logged`
      );

      const addSessionMinutes = (tracker, minutes) => mutateTrackerData(
        tracker.id,
        (prev) => ({
          ...prev,
          totalSeconds: (prev.totalSeconds || 0) + Math.round(minutes * 60),
          logs: [...(prev.logs || []), { kind: "session", seconds: Math.round(minutes * 60), at: Date.now() }],
        }),
        `${tracker.name} logged`
      );

      const removeTracker = async (trackerId) => {
        const next = {
          ...state,
          trackers: state.trackers.filter((tracker) => tracker.id !== trackerId),
          data: Object.fromEntries(Object.entries(state.data).filter(([id]) => id !== trackerId)),
        };
        await persist(next, "Tracker removed");
      };

      const renameTracker = async (trackerId, name) => {
        const next = {
          ...state,
          trackers: state.trackers.map((tracker) => tracker.id === trackerId ? { ...tracker, name } : tracker),
        };
        await persist(next, "Tracker renamed");
      };

      const customizeTracker = async (trackerId, patch) => {
        const next = {
          ...state,
          trackers: state.trackers.map((tracker) => tracker.id === trackerId ? normalizeTracker({ ...tracker, ...patch, id: tracker.id }) : tracker),
        };
        await persist(next, "Tracker updated");
      };

      const removeLog = async (trackerId, logTimestamp) => {
        const tracker = state.trackers.find(t => t.id === trackerId);
        if (!tracker) return;

        await mutateTrackerData(trackerId, (prev) => {
          const logToRemove = (prev.logs || []).find(l => l.at === logTimestamp);
          if (!logToRemove) return prev;

          const nextLogs = (prev.logs || []).filter(l => l.at !== logTimestamp);
          let patch = {};

          if (tracker.type === 'session' && logToRemove.kind === 'session') {
            patch.totalSeconds = Math.max(0, (prev.totalSeconds || 0) - (logToRemove.seconds || 0));
          }
          if (tracker.type === 'numeric' && logToRemove.kind === 'numeric') {
            patch.count = Math.max(0, (prev.count || 0) - (logToRemove.value || 0));
          }

          return { ...prev, logs: nextLogs, ...patch };
        }, `${tracker.name} log removed`);
      };

      const undoLast = async () => {
        if (!undoState?.previous) return;
        setRedoState({ next: state, label: undoState.label });
        setUndoState(null);
        setState(undoState.previous);
        await saveState(undoState.previous);
      };

      const redoLast = async () => {
        if (!redoState?.next) return;
        setUndoState({ previous: state, label: redoState.label || "Redo" });
        setState(redoState.next);
        await saveState(redoState.next);
        setRedoState(null);
      };

      const stopThinking = () => {
        if (!parseControllerRef.current) return;
        parseControllerRef.current.abort();
      };

      const resetData = async () => {
        if (!confirm("Reset all tracker data?")) return;
        const next = {
          trackers: [],
          data: {},
          meta: {
            ...state.meta,
            preferences: state.meta?.preferences || getDefaultPreferences(),
          },
        };
        setState(next);
        await saveState(next);
        closeFloatingUi();
      };

      const logout = async () => {
        if (supabaseClient) {
          await supabaseClient.auth.signOut();
        }
        clearCachedUser();
        setCurrentUserId("");
        setProfileName("");
        setProfileEmail("");
        setAuthForm((current) => ({ ...current, password: "" }));
        closeFloatingUi();
        setState({ trackers: [], data: {}, meta: {} });
        setReady(false);
      };

      const exportData = () => {
        const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const anchor = document.createElement("a");
        anchor.href = url;
        anchor.download = `declo-${profileName.toLowerCase().replace(/\s+/g, "-") || "workspace"}.json`;
        document.body.appendChild(anchor);
        anchor.click();
        anchor.remove();
        URL.revokeObjectURL(url);
        closeFloatingUi();
      };

      const exportCSV = () => {
        const rows = [["Date", "Tracker Name", "Type", "Value", "Unit"]];
        state.trackers.forEach((tracker) => {
          const trackerData = state.data[tracker.id] || {};
          Object.keys(trackerData).forEach((date) => {
            const entry = trackerData[date];
            let val = 0;
            if (tracker.type === "binary") val = entry.done ? 1 : 0;
            if (tracker.type === "numeric") val = entry.count || 0;
            if (tracker.type === "session") val = entry.totalSeconds || 0;
            rows.push([date, tracker.name, tracker.type, val, tracker.unit || ""]);
          });
        });
        const csvContent = rows.map((e) => e.join(",")).join("\n");
        const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
        const url = URL.createObjectURL(blob);
        const anchor = document.createElement("a");
        anchor.href = url;
        anchor.download = `declo-${profileName.toLowerCase().replace(/\s+/g, "-") || "workspace"}.csv`;
        document.body.appendChild(anchor);
        anchor.click();
        anchor.remove();
        URL.revokeObjectURL(url);
        closeFloatingUi();
      };

      const deleteAccount = async () => {
        if (!confirm("Delete your saved Declo cloud data? Your login will remain available.")) return;
        await apiFetch("/api/account", { method: "DELETE" });
        if (supabaseClient) {
          await supabaseClient.auth.signOut();
        }
        clearCachedUser();
        setCurrentUserId("");
        closeFloatingUi();
        setProfileName("");
        setProfileEmail("");
        setAuthForm({ name: "", email: "", password: "" });
        setState({ trackers: [], data: {}, meta: {} });
        setReady(false);
      };

      const openTutorial = () => {
        closeFloatingUi();
        window.open("https://www.youtube.com/results?search_query=tracker+app+tutorial", "_blank", "noopener,noreferrer");
      };

      const jumpToTracker = (trackerId) => {
        cardRefs.current[trackerId]?.scrollIntoView({ behavior: "smooth", block: "center" });
        closeFloatingUi();
      };

      const dayLogs = useMemo(() => {
        if (!dayModal) return [];
        return state.trackers.flatMap((tracker) => {
          const entry = ensureDayData(state.data, tracker.id, dayModal);
          const logs = entry.logs || [];
          return logs.map((log) => {
            if (log.kind === "binary") return { trackerId: tracker.id, trackerName: tracker.name, text: "checked off" };
            if (log.kind === "numeric") return { trackerId: tracker.id, trackerName: tracker.name, text: `+${log.value}${tracker.unit ? ` ${tracker.unit}` : ""}` };
            if (log.kind === "session") return { trackerId: tracker.id, trackerName: tracker.name, text: formatShortDuration(log.seconds) };
            return null;
          }).filter(Boolean);
        });
      }, [dayModal, state]);

      const handleDrop = async (targetId) => {
        if (!draggingId || draggingId === targetId) return;
        const sourceIndex = state.trackers.findIndex((tracker) => tracker.id === draggingId);
        const targetIndex = state.trackers.findIndex((tracker) => tracker.id === targetId);
        if (sourceIndex < 0 || targetIndex < 0) return;
        const nextTrackers = [...state.trackers];
        const [moved] = nextTrackers.splice(sourceIndex, 1);
        nextTrackers.splice(targetIndex, 0, moved);
        setDraggingId(null);
        await persist({ ...state, trackers: nextTrackers }, "Trackers reordered");
      };

      if (bootError) {
        return <BootScreen title="Configuration needed." copy={bootError} />;
      }

      if (!authReady) {
        return <BootScreen title="Loading Declo." copy="Connecting to Supabase and restoring your session." />;
      }

      if (!currentUserId) {
        return (
          <LandingScreen
            authMode={authMode}
            setAuthMode={setAuthMode}
            authForm={authForm}
            setAuthForm={setAuthForm}
            onAuth={handleAuth}
            authLoading={authLoading}
            authError={authError}
            onResetPassword={handleResetPassword}
          />
        );
      }

      return (
        <div className="app-shell">
          <div className={`drawer-backdrop${drawerOpen ? " open" : ""}`} onClick={() => closeFloatingUi()} />
          <aside className={`drawer${drawerOpen ? " open" : ""}`}>
            <div className="drawer-head">
              <div className="drawer-title">Overview</div>
              <button type="button" className="drawer-close" data-tip="Close the overview sidebar." onClick={() => closeFloatingUi()}>×</button>
            </div>
            <Sidebar
              trackers={state.trackers}
              data={state.data}
              onJumpToTracker={jumpToTracker}
              onOpenDay={(day) => {
                closeFloatingUi(["day"]);
                setDayModal(day);
              }}
            />
          </aside>

          <div className="topbar">
            <div className="topbar-left">
              <button
                type="button"
                className="menu-btn"
                data-tip="Open the overview sidebar with progress and tracker shortcuts."
                onClick={() => {
                  const nextOpen = !drawerOpen;
                  closeFloatingUi(nextOpen ? ["drawer"] : []);
                  setDrawerOpen(nextOpen);
                }}
                aria-label="Open sidebar"
              >
                <div className="menu-lines">
                  <span />
                  <span />
                  <span />
                </div>
              </button>
              <div className="brand">
                <div className="brand-title">Declo</div>
                <div className="brand-copy">Customizable Notion, in a single prompt.</div>
              </div>
            </div>

            <div className="topbar-actions">
              <div className="tutorial-wrap">
                <button
                  type="button"
                  className="icon-btn"
                  onClick={undoLast}
                  aria-label="Undo"
                  data-tip="Reverse the last saved workspace change."
                  disabled={!undoState?.previous}
                >
                  ↶
                </button>
              </div>
              <div className="tutorial-wrap">
                <button
                  type="button"
                  className={`icon-btn${musicPlaying ? " active" : ""}`}
                  onClick={() => setMusicPlaying(!musicPlaying)}
                  aria-label="Toggle Music"
                  data-tip="Play background music."
                >
                  {musicPlaying ? "⏸" : "♫"}
                </button>
                <audio ref={audioRef} loop src="https://cdn.pixabay.com/audio/2022/05/27/audio_1808fbf07a.mp3" preload="none" />
              </div>
              <div className="profile-wrap">
                <button
                  type="button"
                  className="icon-btn"
                  onClick={redoLast}
                  aria-label="Redo"
                  data-tip="Reapply the last action you undid."
                  disabled={!redoState?.next}
                >
                  ↷
                </button>
              </div>
              <div className="tutorial-wrap">
                <button
                  type="button"
                  className="icon-btn"
                  onClick={stopThinking}
                  aria-label="Stop thinking"
                  data-tip="Cancel the current prompt generation."
                  disabled={!loading}
                >
                  ■
                </button>
              </div>
              <div className="tutorial-wrap">
                <button type="button" className="icon-btn tutorial-btn" data-tip="Open a quick external tutorial search for tracker ideas." onClick={openTutorial} aria-label="Open YouTube tutorial">
                  ▶
                </button>
              </div>
              <div className="profile-wrap">
                <button
                  type="button"
                  className="profile-btn"
                  data-tip={profileOpen ? undefined : "Open account actions and workspace controls."}
                  onClick={() => {
                    const nextOpen = !profileOpen;
                    closeFloatingUi(nextOpen ? ["profile"] : []);
                    setProfileOpen(nextOpen);
                  }}
                >
                  {getInitials(profileName)}
                </button>
                {profileOpen ? (
                  <div className="profile-menu">
                    <button
                      type="button"
                      className="profile-item"
                      data-tip="Adjust theme, motion, and reminder preferences."
                      onClick={() => { closeFloatingUi(["preferences"]); setPreferencesOpen(true); }}
                    >
                      Preferences
                    </button>
                    <button type="button" className="profile-item" data-tip="Download your current Declo workspace." onClick={() => setExportMenuOpen(open => !open)}>Export data…</button>
                    {exportMenuOpen ? (
                      <div className="profile-submenu">
                        <button type="button" className="profile-item" onClick={exportData}>as JSON</button>
                        <button type="button" className="profile-item" onClick={exportCSV}>as CSV</button>
                      </div>
                    ) : null}
                    <button type="button" className="profile-item" data-tip="Sign out of this device without deleting saved data." onClick={logout}>Logout</button>
                    <div className="profile-divider" />
                    <button
                      type="button"
                      className="profile-item danger"
                      data-tip="Choose whether to wipe local tracker data or remove cloud-saved account data."
                      onClick={() => setDeleteMenuOpen((open) => !open)}
                    >
                      Delete…
                    </button>
                    {deleteMenuOpen ? (
                      <div className="profile-submenu">
                        <button type="button" className="profile-item danger" data-tip="Remove only the tracker data currently stored in this workspace." onClick={resetData}>Reset local data</button>
                        <button type="button" className="profile-item danger" data-tip="Delete your saved cloud workspace and sign out." onClick={deleteAccount}>Delete cloud data</button>
                      </div>
                    ) : null}
                  </div>
                ) : null}
              </div>
            </div>
          </div>

          <main className={`main${composerOpen ? " composer-open" : ""}`}>
              {state.trackers.length > 0 ? (
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(140px, 1fr))", gap: "12px", marginBottom: "8px" }}>
                  {state.trackers.map(tracker => {
                    const entry = ensureDayData(state.data, tracker.id, today);
                    let progress = 0;
                    if (tracker.type === "binary") progress = entry.done ? 100 : 0;
                    if (tracker.type === "numeric") progress = tracker.goal ? Math.min((entry.count || 0) / tracker.goal * 100, 100) : (entry.count ? 100 : 0);
                    if (tracker.type === "session") progress = entry.totalSeconds > 0 ? 100 : 0;
                    return (
                      <div key={`vis_${tracker.id}`} style={{ padding: "12px", borderRadius: "16px", background: "var(--surface)", border: "1px solid var(--line)" }}>
                        <div style={{ fontSize: "0.85rem", fontWeight: 600, marginBottom: "8px", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{tracker.name}</div>
                        <div className="progress-track" style={{ height: "6px" }}><div className="progress-fill" style={{ width: `${progress}%` }} /></div>
                      </div>
                    );
                  })}
                </div>
              ) : null}

              {state.trackers.length > 0 ? (
                <section className={`utility-row${composerOpen ? " composer-active" : ""}`}>
                  <div className="utility-actions">
                    <button
                      type="button"
                      className="composer-btn"
                      data-tip="Open the prompt composer and create or update trackers."
                      onClick={() => {
                        const nextOpen = !composerOpen;
                        closeFloatingUi(nextOpen ? ["composer"] : []);
                        setComposerOpen(nextOpen);
                        setManualOpen(false);
                        setTimeout(() => inputRef.current?.focus(), 0);
                      }}
                    >
                      {composerOpen ? "Close prompt" : "Prompt Declo"}
                    </button>
                  </div>
                  <div className="utility-copy">{error || `Hi ${profileName}. Press + to focus the prompt any time.`}</div>
                </section>
              ) : null}

              {state.trackers.length === 0 || composerOpen ? (
                <PromptCard
                  input={input}
                  setInput={setInput}
                  onSubmit={handleSubmit}
                  loading={loading}
                  onManualToggle={() => {
                    closeFloatingUi(["composer", "manual"]);
                    setComposerOpen(true);
                    setManualOpen((open) => !open);
                  }}
                  manualOpen={manualOpen}
                  statusText={error || (state.trackers.length === 0
                    ? "Set up your workspace in one prompt."
                    : "Update what Declo tracks without opening settings.")}
                  inputRef={inputRef}
                  frequencyPreset={frequencyPreset}
                  setFrequencyPreset={setFrequencyPreset}
                  customFrequency={customFrequency}
                  setCustomFrequency={setCustomFrequency}
                />
              ) : null}

              {manualOpen ? (
                <section className="prompt-card">
                  <ManualCreate manual={manual} setManual={setManual} onAdd={addManualTracker} />
                </section>
              ) : null}

              <section className="cards">
                {ready && state.trackers.length === 0 ? (
                  <div className="card">
                    <div className="metric"><strong>start by typing what you want to track</strong></div>
                  </div>
                ) : null}

                {state.trackers.map((tracker) => {
                  const entry = ensureDayData(state.data, tracker.id, today);
                  return (
                    <TrackerCard
                      key={tracker.id}
                      tracker={tracker}
                      entry={entry}
                      trackerHistory={state.data[tracker.id] || {}}
                      onDelete={() => removeTracker(tracker.id)}
                      onRename={(name) => renameTracker(tracker.id, name)}
                      onToggleBinary={() => toggleBinary(tracker)}
                      onAddNumeric={(amount) => addNumeric(tracker, amount)}
                      onSubtractNumeric={(amount) => subtractNumeric(tracker, amount)}
                      onToggleSession={() => toggleSession(tracker)}
                      onLogSession={() => logSession(tracker)}
                      onAddSessionMinutes={(minutes) => addSessionMinutes(tracker, minutes)}
                      onToggleCustomize={() => setExpanded((prev) => ({ ...prev, [tracker.id]: !prev[tracker.id] }))}
                      expanded={Boolean(expanded[tracker.id])}
                      onCustomize={(patch) => customizeTracker(tracker.id, patch)}
                      onRemoveLog={(logAt) => removeLog(tracker.id, logAt)}
                      draggableProps={{
                        dragging: draggingId === tracker.id,
                        onDragStart: () => setDraggingId(tracker.id),
                        onDragOver: (e) => e.preventDefault(),
                        onDrop: () => handleDrop(tracker.id),
                      }}
                      innerRef={(node) => { cardRefs.current[tracker.id] = node; }}
                    />
                  );
                })}
              </section>
          </main>

          {dayModal ? <LogsModal dayKey={dayModal} logs={dayLogs} onClose={() => setDayModal(null)} /> : null}
          {preferencesOpen ? (
            <PreferencesModal
              preferences={state.meta?.preferences || getDefaultPreferences()}
              onUpdate={updatePreferences}
              onClose={() => closeFloatingUi()}
            />
          ) : null}
        </div>
      );
    }

    async function bootstrap() {
      let bootError = "";
      try {
        await loadRuntimeConfig();
      } catch (error) {
        bootError = error.message || "Unable to initialize Declo.";
      }
      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App bootError={bootError} />);
    }

    bootstrap();
  </script>
</body>
</html>
